services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rag:
    build: .
    command: python -m rag.server
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped

  mcp:
    build: .
    command: python -m mcp_server.server
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - rag
    restart: unless-stopped

  agent:
    build: .
    command: python -m agent.main
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - REDIS_HOST=redis
      - RAG_HOST=rag
      - MCP_HOST=mcp
    depends_on:
      - mcp
